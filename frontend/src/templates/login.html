<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumincoin Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<section class="container">
<div class="min-vh-100 d-flex justify-content-center text-center">
    <div class="login-box row w-100 align-items-center justify-content-center">
        <div class="col-12 col-xl-4 col-lg-4 col-md-6 col-sm-7 d-flex flex-column align-items-center px-0">
            <div class="login-logo text-center mb-5">
                <img src="../static/images/logo.png" alt="Logo" class="img-fluid center">
            </div>
            <h1>Вход</h1>
                <form class="w-100 form-group row text-center d-flex flex-column gap-2 p-0 form-control-lg">
                    <div class="col input-group px-0">
                        <div class="invalid-feedback fs-min">
                            Заполните пожалуйста email
                        </div>
                        <div id="basic-addon1" class="input-group-text">
                            <img src="../static/images/icon-mail.png" alt="Icon mail" class="input-image">
                        </div>
                        <input type="email" class="form-control pe-5" placeholder="Электронная почта"
                               aria-describedby="basic-addon1">
                    </div>
                    <div class="col input-group px-0">
                        <div class="invalid-feedback fs-min">
                            Заполните пожалуйста пароль
                        </div>
                        <div id="basic-addon2" class="input-group-text">
                            <img src="../static/images/icon-lock.png" alt="Icon mail" class="input-image">
                        </div>
                        <input type="password" class="form-control" placeholder="Пароль" aria-describedby="basic-addon2">
                    </div>
                    <div class="col fs-6 px-0">
                        <div class="form-check text-start fs-min">
                            <input class="form-check-input" type="checkbox" id="inlineFormCheck">
                            <label class="form-check-label" for="inlineFormCheck">
                                Запомнить меня
                            </label>
                        </div>
                    </div>
                    <div class="col px-0">
                        <button class="btn btn-primary w-100" type="button">Войти</button>
                    </div>
                    <div class="col px-0 text-start">
                    <p class="fs-min">Еще нет аккаунта?<a class="ms-2" href="#">Пройдите регистрацию</a></p>
                    </div>
                </form>
        </div>
    </div>
</div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>
</html>
