<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumincoin Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container-fluid">
    <div class="row gx-0 min-vh-100">
        <aside class="col-12 col-sm-4 col-md-3 col-lg-2 d-flex flex-column justify-content-between py-5 px-0 text-center my-border">
            <div class="navbar d-flex flex-column fs-6">

                <div class="logo text-center mb-4">
                    <img src="../static/images/logo.png" alt="Logo" class="img-fluid center">
                </div>
                <div class="border-top w-100">
                    <div class="d-flex flex-column mt-60">
                        <ul class="nav nav-pills flex-column px-3 fs-6 lh-lg">
                            <li class="nav-item w-100">
                                <a href="#" class="nav-link w-100 active py-2 text-start d-flex align-items-center"
                                   aria-current="page">
                                    <img src="../static/images/icon-home.png" alt="Icon home"
                                         class="img-fluid me-2 d-inline-block align-text-top">
                                    Главная
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="transactions.html"
                                   class="nav-link w-100 link-dark py-2 text-start d-flex align-items-center text-wrap">
                                    <img src="../static/images/icon-budget.png" alt="Icon budget"
                                         class="img-fluid me-2 d-inline-block align-text-top">
                                    Доходы & Расходы
                                </a>
                            </li>
                            <li class="nav-item w-100 px-3">
                                <div class="accordion-item d-flex flex-column w-100 mt-1">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button mb-2" type="button" data-bs-toggle="collapse"
                                                data-bs-target="#panelsStayOpen-collapseOne" aria-expanded="true"
                                                aria-controls="panelsStayOpen-collapseOne">
                                            Категории
                                            <img src="../static/images/icon-arrow.png" class="ms-auto" alt="Arrow">
                                        </button>
                                    </h2>
                                    <div id="panelsStayOpen-collapseOne" class="accordion-collapse collapse show">
                                        <div class="accordion-body text-start">
                                            <a class="dropdown-item" href="income-groups.html">Доходы</a>
                                            <a class="dropdown-item" href="outlay-groups.html">Расходы</a>
                                        </div>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="down">
                <div class="balance text-start mb-20 px-3">Баланс: <span class="text-primary">500 ₽</span></div>
                <div class="border-top">

                    <div class="d-flex align-items-center gap-2 px-3 mt-4">

                        <img src="../static/images/icon-user.png" alt="User icon"
                             class="rounded-circle me-2 d-inline-block align-text-top">
                        <p class="mb-0 text-wrap">Роман Чернов</p>
                    </div>
                </div>
            </div>
        </aside>
        <section class="content col-12 col-sm-8 col-md-9 col-lg-10 pt-sm-5 ps-sm-3 ps-md-3 ps-lg-5 p-0 text-start" id="content">
            <h1 class="mt-xl-5 mt-lg-5 mt-md-5 mt-sm-0">Главная</h1>
            <div class="container-fluid m-0 ps-0 pe-sm-5 pe-0 ">
                <div class="mt-5">
                    <div class="row gx-0 d-grid gap-2 d-md-flex d-lg-flex mb-3 me-0 me-sm-2">
                        <button class="col-12 col-md-4 col-lg-2 col-xxl-1 btn btn-secondary" type="button">Сегодня</button>
                        <button class="col-12 col-md-4 col-lg-2 col-xxl-1 btn btn-outline-secondary" type="button">Неделя</button>
                        <button class="col-12 col-md-4 col-lg-2 col-xxl-1 btn btn-outline-secondary" type="button">Месяц</button>
                        <button class="col-12 col-md-4 col-lg-2 col-xxl-1 btn btn-outline-secondary" type="button">Год</button>
                        <button class="col-12 col-md-4 col-lg-2 col-xxl-1 btn btn-outline-secondary" type="button">Все</button>
                        <button class="col-12 col-md-4 col-lg-2 col-xxl-auto btn btn-outline-secondary" type="button">Интервал</button>
                        <div class="col-12 col-md-5 col-lg-5 col-xxl-3 choice-date">
                            <span>с</span>
                            <button type="button" class="btn btn-link">Дата</button>
                            <span>по</span>
                            <button type="button" class="btn btn-link">Дата</button>
                        </div>
                    </div>
                </div>
                <div class="row mt-5 text-center">
                    <div class="col-xxl-6 col-lg-12 pb-5 my-border-block">
                        <h2 class="mb-3">Доходы</h2>
                        <div class="color-section mb-5">
                            <label class="form-check-inline">
                                <button class="btn btn-color bg-danger" type="button" id="incomeRed"></button>
                                <span>Red</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color btn-orange" type="button" id="incomeOrange"></button>
                                <span>Orange</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color bg-warning" type="button" id="incomeYellow"></button>
                                <span>Yellow</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color btn-green" type="button" id="incomeGreen"></button>
                                <span>Green</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color bg-primary" type="button" id="incomeBlue"></button>
                                <span>Blue</span>
                            </label>
                        </div>
                        <div class="color-circle">
                            <div class="mx-auto pie-circle-income"></div>
                        </div>
                    </div>

                    <div class="col-xxl-6 col-lg-12">
                        <h2 class="mb-3">Расходы</h2>
                        <div class="color-section mb-5">
                            <label class="form-check-inline">
                                <button class="btn btn-color bg-danger" type="button" id="expenseRed"></button>
                                <span>Red</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color btn-orange" type="button" id="expenseOrange"></button>
                                <span>Orange</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color bg-warning" type="button" id="expenseYellow"></button>
                                <span>Yellow</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color btn-green" type="button" id="expenseGreen"></button>
                                <span>Green</span>
                            </label>
                            <label class="form-check-inline">
                                <button class="btn btn-color bg-primary" type="button" id="expenseBlue"></button>
                                <span>Blue</span>
                            </label>
                        </div>
                        <div class="color-circle">
                            <div class="mx-auto pie-circle-expenses"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>

</body>
</html>
